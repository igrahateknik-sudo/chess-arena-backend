<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#06070f"/>
  <!-- Amber glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#f59e0b" stroke-width="6" opacity="0.2"/>
  <!-- Chess king piece (crown) -->
  <g transform="translate(256, 256)">
    <!-- Crown base -->
    <rect x="-80" y="60" width="160" height="28" rx="8" fill="#f59e0b"/>
    <!-- Crown body -->
    <rect x="-68" y="-20" width="136" height="86" rx="6" fill="#d97706"/>
    <!-- Crown points -->
    <polygon points="0,-80 -20,-20 20,-20" fill="#f59e0b"/>
    <polygon points="-68,-60 -88,-10 -48,-10" fill="#f59e0b"/>
    <polygon points="68,-60 88,-10 48,-10" fill="#f59e0b"/>
    <!-- Jewels -->
    <circle cx="0" cy="-48" r="8" fill="#fde68a"/>
    <circle cx="-68" cy="-38" r="6" fill="#fde68a"/>
    <circle cx="68" cy="-38" r="6" fill="#fde68a"/>
    <!-- Cross on top -->
    <rect x="-8" y="-100" width="16" height="30" rx="4" fill="#f59e0b"/>
    <rect x="-20" y="-92" width="40" height="14" rx="4" fill="#f59e0b"/>
  </g>
</svg>
